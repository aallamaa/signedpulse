# Example SignedPulse client configuration.
# Easiest to generate this with:
#   signedpulse-client init --server <HOST> --server-key <SERVER_X25519_PUBLIC>
# Run with: signedpulse-client --config /etc/signedpulse/client.toml

[client]
# 256-bit identity as 64 hex chars (generated by `init`).
client_id = "REPLACE_WITH_64_HEX_CHARS_256_BIT_CLIENT_ID"
server_addr = "203.0.113.10:7370"
# Must match the server's `server_id`; it is part of the signed payload.
server_id = "signedpulse-main"
interval_seconds = 300
# Base64 Ed25519 private key seed. KEEP SECRET.
private_key = "REPLACE_WITH_BASE64_ED25519_PRIVATE_KEY"
# SIP-style retry backoff: attempt k waits min(retry_initial_ms × 2^(k-1),
# retry_max_ms) for the CHALLENGE before retransmitting.
retry_initial_ms = 500
retry_max_ms = 4000
retries = 3
# (challenge_timeout_seconds is deprecated and ignored; superseded by the above.)
# On graceful shutdown (SIGTERM/Ctrl-C), send a signed BYE to each server so it
# releases this client's access lease now (runs the revoke hook immediately)
# instead of waiting for the lease to time out. Default true; set false to skip.
bye_on_shutdown = true
# Seal every datagram to the server (default). Must match server wire_encryption.
wire_encryption = true
# Server's base64 X25519 public key (printed by `signedpulse-server init`).
# Required when wire_encryption is true or param_command is set.
server_encryption_key = "REPLACE_WITH_BASE64_X25519_SERVER_PUBLIC"

# Optional: a command whose stdout becomes the (encrypted, signed) parameter sent
# to the server each pulse and passed to the hook as {param}. argv only (no shell
# unless you put one in the argv). Empty or failing -> the cycle is skipped.
# param_command = ["/usr/local/bin/get-tag"]
# param_command_timeout_seconds = 5
# param_max_len = 256

# Optional: where `signedpulse-client status` reads live state (see README).
# state_file = "/run/signedpulse/client.state.json"

# Optional: pulse additional servers from this one client. The table key is a
# LOCAL LABEL (for status/uniqueness), not the wire server_id. Each block adds an
# independent pulse loop sharing the identity above (client_id/private_key). Only
# server_addr is required; omitted fields inherit from [client]. Each server has
# its OWN X25519 key (server_encryption_key is never inherited).
#
# server_id MUST match the remote server's configured server_id (it is signed
# into the payload). It defaults to the label, so set it only when they differ —
# e.g. when a second server also kept the default "signedpulse-main".
# [client.servers.backup]
# server_addr = "203.0.113.20:7370"
# server_id = "signedpulse-main"    # the REMOTE server's server_id (defaults to the label)
# server_encryption_key = "REPLACE_WITH_BACKUP_SERVER_X25519_PUBLIC"
# interval_seconds = 600            # optional override (else inherits [client])
# wire_encryption = true            # optional override
